<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbitime</title>
    <link rel="icon" href="./assets/logos/favicon-placeholder.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0F172A">
    <meta name="description" content="Orbitime - Calendario inteligente premium">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: #0F172A;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .entry-loader {
            text-align: center;
            color: #F8FAFC;
        }

        .entry-loader h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
    </style>
</head>

<body>
    <div class="entry-loader">
        <h1>Orbitime</h1>
        <p>Cargando módulo principal...</p>
    </div>
    <script type="module">
        // Redirigir a la pantalla de carga real si el usuario no tiene sesión activa
        import { auth, onAuthChange } from './src/core/auth.js';
        onAuthChange(user => {
            if (user) window.location.href = '/pages/dashboard.html';
            else window.location.href = '/loading.html';
        });
    </script>
</body>

</html>
