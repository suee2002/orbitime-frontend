<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbitime · Cargando</title>
    <link rel="icon" href="./assets/logos/favicon-placeholder.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F172A;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
        }

        .splash {
            text-align: center;
        }

        .orbit {
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .brand {
            color: #F8FAFC;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-top: 0.5rem;
        }

        .progress-container {
            width: 220px;
            height: 4px;
            background: #334155;
            border-radius: 6px;
            margin: 2rem auto 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #38BDF8, #818CF8);
            border-radius: 6px;
            transition: width 0.4s ease;
        }
    </style>
</head>

<body>
    <div class="splash">
        <div class="orbit">🪐</div>
        <div class="brand">Orbitime</div>
        <div class="progress-container">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
    <script type="module">
        import { onAuthChange } from './src/core/auth.js';
        const fill = document.getElementById('progressFill');
        let percent = 0;
        const interval = setInterval(() => {
            percent += Math.random() * 20;
            if (percent >= 90) { percent = 90; clearInterval(interval); }
            fill.style.width = Math.min(percent, 100) + '%';
        }, 300);

        onAuthChange(user => {
            fill.style.width = '100%';
            setTimeout(() => {
                window.location.href = user ? '/pages/dashboard.html' : '/pages/login.html';
            }, 400);
        });
    </script>
</body>

</html>
